name: CI

on:
  push:
    branches: [main, master, feature/**]
  pull_request:
    branches: [main, master, feature/**]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js 18.x
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm ci
      - run: npm run lint
      - run: npm run format
      - run: npm test -- --watchAll=false
      - run: npm run build
